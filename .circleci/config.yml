version: 2.1

orbs:
  android: circleci/android@2.5.0

jobs:
  # Android Deployment Job
  deploy-android:
    docker:
      - image: cimg/android:2024.01.1
    resource_class: large
    steps:
      - checkout
      
      # Install Flutter
      - run:
          name: Install Flutter
          command: |
            git clone https://github.com/flutter/flutter.git -b stable --depth 1
            echo 'export PATH="$PATH:$HOME/project/flutter/bin"' >> $BASH_ENV
            source $BASH_ENV
            flutter doctor
      
      # Install Ruby and Fastlane
      - run:
          name: Install Fastlane
          command: |
            sudo apt-get update
            sudo apt-get install -y ruby-full
            sudo gem install fastlane -NV
      
      # Setup Android signing
      - run:
          name: Setup Android Keystore
          command: |
            cd customer-nzubia-global/android
            # Hardcoded Base64 for Keystore
            echo "" | base64 -d > nzubia-release-key.jks
            echo "storePassword=Password@2026?" > key.properties
            echo "keyPassword=Password@2026?" >> key.properties
            echo "keyAlias=nzubia-key" >> key.properties
            echo "storeFile=nzubia-release-key.jks" >> key.properties
      
      # Setup Google Play Service Account (PLACEHOLDER - Provide JSON content)
      - run:
          name: Setup Google Play Service Account
          command: |
            cd customer-nzubia-global/android/fastlane
            # TODO: Replace with actual JSON content from Google Cloud Console
            echo '{"type": "service_account", "project_id": "...", ...}' > google-play-service-account.json
      
      # Deploy to Play Store
      - run:
          name: Deploy to Play Store
          command: |
            cd customer-nzubia-global/android
            fastlane internal
      
      # Store artifacts
      - store_artifacts:
          path: customer-nzubia-global/build/app/outputs/bundle/release/app-release.aab
          destination: app-release.aab

  # iOS Deployment Job
  deploy-ios:
    macos:
      xcode: 15.1.0
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      
      # Install Flutter
      - run:
          name: Install Flutter
          command: |
            git clone https://github.com/flutter/flutter.git -b stable --depth 1
            echo 'export PATH="$PATH:$HOME/project/flutter/bin"' >> $BASH_ENV
            source $BASH_ENV
            flutter doctor
      
      # Install Fastlane
      - run:
          name: Install Fastlane
          command: |
            sudo gem install fastlane -NV
      
      # Setup App Store Connect API Key (PLACEHOLDERS)
      - run:
          name: Setup App Store Connect API
          command: |
            cd customer-nzubia-global/ios/fastlane
            # TODO: Replace XXXXXX with actual values from App Store Connect
            echo "APP_STORE_CONNECT_API_KEY_ID=XXXXXX" > .env
            echo "APP_STORE_CONNECT_ISSUER_ID=XXXXXX" >> .env
            echo "APP_STORE_CONNECT_API_KEY_CONTENT=-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----" >> .env
      
      # Create ExportOptions.plist
      - run:
          name: Create Export Options
          command: |
            cd customer-nzubia-global/ios
            cat > ExportOptions.plist << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>compileBitcode</key>
                <false/>
            </dict>
            </plist>
            EOF
      
      # Deploy to TestFlight
      - run:
          name: Deploy to TestFlight
          command: |
            cd customer-nzubia-global/ios
            fastlane beta
      
      # Store artifacts
      - store_artifacts:
          path: customer-nzubia-global/build/ios/ipa/customer_nzubia_global.ipa
          destination: app-release.ipa

workflows:
  # Deploy on push to specific branches
  deploy-mobile:
    jobs:
      # Android deployment
      - deploy-android:
          filters:
            branches:
              only:
                - development
                - production
          # Context contains any remaining secrets if moved there later
          # context: mobile-deployment
      
      # iOS deployment (only on macOS)
      - deploy-ios:
          filters:
            branches:
              only:
                - development
                - production
          # context: mobile-deployment
  
  # Manual deployment workflow
  manual-deploy:
    jobs:
      - hold-android:
          type: approval
      - deploy-android:
          requires:
            - hold-android
          # context: mobile-deployment
      
      - hold-ios:
          type: approval
      - deploy-ios:
          requires:
            - hold-ios
          # context: mobile-deployment
